<!doctype html>
<html>

    <head>
        <title> Categories </title>
        <meta name="description" content="Categories page" />
        <link rel="stylesheet" href="inner.css" />
        <script type="text/javascript" src="../script_controllers/categories.js"></script>
    </head>

    <body>
        <!-- The category theme background must be set dynamically -->
        <body class="category-theme">

        <section class="about-container">
            <div class="title-box">
                <h1 id="title"></h1>
            </div>

            <div class="content-box">
                <p id="description"></p>
            </div>
        </section>




        <div class="controls-box">
            <h3>Features</h3>
            <div id="keyword-filters">
                <!-- template: Propagate keyword filter buttons here -->
            </div>
            <button onclick="clearFilters()">Clear Filters</button>

            <h3> Sort By </h3>
            <div id = "sort-options">
                <!-- Hard insert sort filter buttons for simplicity -->
                <button onclick="increasingPrice()">Low → High</button>
                <button onclick="decreasingPrice()">High → Low</button>
                <button onclick="alphabeticalSort()">A → Z</button>
                <button onclick="rev_alphabeticalSort()">Z → A</button>
                <button onclick="newestDateSort()">Newest First</button>
                <button onclick="oldestDateSort()">Oldest First</button>
            </div>

        </div>




        <section class="data-section">
            <div id="items-container"></div>

            <!-- template -->
            <div class="item-card" style="display: none;">
                <img class="item-img" src="" alt="">
                <div class="item-info">
                    <h3 class="item-name"></h3>
                    <p class="item-brand"></p>
                    <p class="item-price"></p>
                    <a class="item-link" target="_blank">View Product</a>
                </div>
            </div>
        </section>




        <div class="footer">
            <a href="../index.html">
                <button> Home </button>
            </a>

            <a href="about.html">
                <button>About</button>
            </a>

            <button onclick="previousPage()">Previous</button>
        </div>
    </body>
</html>
